<!DOCTYPE html>
<html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plot Twist - Startpage</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script type="module" src="map.js"></script>
  <!-- <script type="module" src="startpage.js"></script> -->

</head>
<body>

  <!-- HERO BANNER -->
  <div class="hero-banner">
      <img src="images/plot-twist-side-logo.png" alt="Logo" class="logo" width="100%">
  </div>

    <br>

  <!-- TAGLINE -->
  <div class="tagline-card">
    <p>PLOT TWIST is a hyperlocal app for sharing and trading plants with neighbors. No store. No shipping. Just a map, a plant, and a handshake.</p>
  </div>

    <br>

    <!-- HERO IMAGE -->
    <div class=""></div>
    <img src="/images/parts_ divider_copy_3.png" class="divider" alt="">

  <!-- MAP SECTION -->
  <div class="current-plants">Current plants up for trade
    <div id="map"></div>
  </div>


  <!-- PLANT GRID -->
  <div id="plant-grid">

  </div>
  <br>

  <!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="nav-logo">
    <img src="./images/pin-logo.png" alt="Pin" height="40px">
    <div>
      <img src="./images/plot.png" alt="Plot" height="15px">
      <br>
      <img src="./images/twist.png" alt="Twist" height="15px">
    </div>
  </div>
    <div class="home">
        <a href="./index.html" class="icon-wrapper">
            <img src="./images/icons/active-home.png" alt="Start">
            <span class="tooltip">Start</span>
        </a>
    </div>

    <div class="favourites" hidden>
        <a href="./favourites.html" class="icon-wrapper">
            <img src="./images/icons/fav.png" alt="Favourites">
            <span class="tooltip">Favourites</span>
        </a>
    </div>

    <div class="add-plant" hidden>
        <a href="./addplant.html" class="icon-wrapper">
            <img src="./images/icons/add-plant.png" alt="Add Plant">
            <span class="tooltip">Add Plant</span>
        </a>
    </div>

    <div class="notifications" hidden>
        <a href="./notifications.html" class="icon-wrapper">
            <img src="./images/icons/notif.png" alt="Notifications">
            <span class="tooltip">Notifications</span>
        </a>
    </div>

    <div class="user-login">
        <a href="./userLogin.html" class="icon-wrapper">
            <img src="./images/icons/user-log-in.png" alt="Log in">
            <span class="tooltip">Log in</span>
        </a>
    </div>

    <div class="admin">
        <a href="adminLogin.html" class="icon-wrapper">
            <img src="./images/icons/admin.png" alt="Admin">
            <span class="tooltip">Admin</span>
        </a>
    </div>

</nav>

    <!-- PLANT MODAL — MORE INFO -->
  <div id="plant-modal" class="modal hidden">
    <div class="modal-content">
      <button id="close-modal">X</button>

      <img id="modal-image" src="">
      <h2 id="modal-name"></h2>
      <p id="modal-owner"></p>
      <p id="modal-water"></p>

      <button id="trade-btn">Send trade request</button>
    </div>
  </div>

</body>
</html>
