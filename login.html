<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In</title>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
<h1 class="title">Welcome Back</h1>
<p class="subtitle">Log in to your account</p>

    <div class="form-page">

        <div class="content">

            <!-- Login Section -->


            <div class="field">
                <label>Email</label>
                <input type="email" placeholder="Enter your email" />
            </div>

            <div class="field">
                <label>Password</label>
                <input type="password" placeholder="Enter your password" />
            </div>

            <button class="btn-login">Log In</button>

            <p class="extra">Forgot password?</p>

            <!-- Divider -->
            <div class="divider">
                <span>OR</span>
            </div>

            <!-- Create Account Section -->
            <h2 class="subtitle">New here?</h2>

            <div class="field">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name" />
            </div>

            <div class="field">
                <label>Email</label>
                <input type="email" placeholder="Enter your email" />
            </div>

            <div class="field">
                <label>Password</label>
                <input type="password" placeholder="Create a password" />
            </div>

            <button class="btn-signup">Create Account</button>

        </div>

        <!-- Nav bar -->
        <nav class="bottom-nav">
            <a href="./index.html">
                <br>
                <img src="images/icons/home.png" alt="Start">
            </a>

            <a href="#" hidden>
                <br>
                <img src="images/icons/fav.png" alt="Favourites">
            </a>

            <a href="./addplant.html" hidden>
                <img src="images/icons/add-plant.png" alt="Add Plant">
            </a>

            <a href="./notifications.html" hidden>
                <br>
                <img src="images/icons/notif.png" alt="Notification">
            </a>

            <a href="./login.html">
                <br>
                <img src="/images/icons/active-user.png" alt="Log in">
            </a>
        </nav>

    </div>

</body>

</html>
