<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plot Twist - Log In Admin</title>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
<h1 class="title">Welcome Admin</h1>
<p class="subtitle">Log in to your administration account</p>

  <div class="form-page">

    <div class="content">

      <!-- Login Section -->
      <div class="field">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" />
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" />
      </div>

      <button class="btn-login">Log In</button>

    </div>

    <!-- Nav bar -->
<nav class="bottom-nav">
  <div class="nav-logo">
    <img src="./images/pin-logo.png" alt="Pin" height="40px">
    <div>
      <img src="./images/plot.png" alt="Plot" height="15px">
      <br>
      <img src="./images/twist.png" alt="Twist" height="15px">
    </div>
  </div>

  <div class="home">
    <a href="./index.html" class="icon-wrapper">
      <img src="./images/icons/home.png" alt="Start">
      <span class="tooltip">Start</span>
    </a>
  </div>

  <div class="favourites" hidden>
    <a href="./favourites.html" class="icon-wrapper">
      <img src="./images/icons/fav.png" alt="Favourites">
      <span class="tooltip">Favourites</span>
    </a>
  </div>

  <div class="add-plant" hidden>
    <a href="./addplant.html" class="icon-wrapper">
      <img src="./images/icons/add-plant.png" alt="Add Plant">
      <span class="tooltip">Add Plant</span>
    </a>
  </div>

  <div class="notifications" hidden>
    <a href="./notifications.html" class="icon-wrapper">
      <img src="./images/icons/notif.png" alt="Notifications">
      <span class="tooltip">Notifications</span>
    </a>
  </div>

  <div class="user-profile" hidden>
    <a href="./userProfile.html" class="icon-wrapper">
      <img src="./images/icons/user-log-in.png" alt="Log in">
      <span class="tooltip">Log in</span>
    </a>
  </div>

  <div class="admin">
    <a href="adminLogin.html" class="icon-wrapper">
      <img src="./images/icons/active-admin.png" alt="Admin">
      <span class="tooltip">Admin</span>
    </a>
  </div>

</body>

</html>
