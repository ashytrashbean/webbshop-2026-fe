<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plot Twist - Notifications</title>

  <script type="module" src="./src/scripts/notifications.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="filter">
    <a href="notifications.html" class="icon-wrapper">
      <img src="./images/icons/filter.png" alt="Filter">
      <span class="tooltip">Filter</span>
    </a>
  </div>

  <h1 class="title">My Notifications</h1>
  <p class="subtitle">Swap or no swap</p>

  <div class="form-page">
    <div class="content">
      <div id="notification-list" class="notification-list">
      </div>
    </div>
  </div>

  
  <nav class="bottom-nav">
    <div class="nav-logo">
      <img src="./images/pin-logo.png" alt="Pin" height="40">
      <div>
        <img src="./images/plot.png" alt="Plot" height="15">
        <br>
        <img src="./images/twist.png" alt="Twist" height="15">
      </div>
    </div>

    <div class="home">
      <a href="./startpage.html" class="icon-wrapper">
        <img src="./images/icons/home.png" alt="Start">
        <span class="tooltip">Start</span>
      </a>
    </div>

    <div class="favourites" hidden>
      <a href="./favourites.html" class="icon-wrapper">
        <img src="./images/icons/fav.png" alt="Favourites">
        <span class="tooltip">Favourites</span>
      </a>
    </div>

    <div class="add-plant">
      <a href="./addplant.html" class="icon-wrapper">
        <img src="./images/icons/add-plant.png" alt="Add Plant">
        <span class="tooltip">Add Plant</span>
      </a>
    </div>

    <div class="notifications">
      <a href="./notifications.html" class="icon-wrapper">
        <img src="./images/icons/active-notif.png" alt="Notifications">
        <span class="tooltip">Notifications</span>
      </a>
    </div>

    <div class="user-profile">
      <a href="./userProfile.html" class="icon-wrapper">
        <img src="./images/icons/user-log-in.png" alt="User Profile">
        <span class="tooltip">Profile</span>
      </a>
    </div>

    <div class="admin" hidden>
      <a href="#" class="icon-wrapper">
        <img src="./images/icons/admin.png" alt="Admin">
        <span class="tooltip">Admin</span>
      </a>
    </div>
  </nav>
</body>
</html>
